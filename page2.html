<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Bouquet!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Open it!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="envelope">
    <div class="page-container flex-center flex-col relative w-full min-h-screen">
      
      <div class="absolute top-8 left-8">
        <a href="index.html" class="brutal-btn secondary">⬅️ Back</a>
      </div>
      <div class="absolute top-8 right-8">
        <a href="page3.html" id="next-btn-2" class="brutal-btn primary hide-initially opacity-0 pointer-events-none">Next ➡️</a>
      </div>

      <div class="w-full max-w-md relative mt-20" id="envelope-container" style="cursor: pointer;">
        <!-- Envelope Back -->
        <svg viewBox="0 0 400 300" class="w-full h-auto brutal-shadow-lg brutal-border rounded-md bg-[#ffe066]" style="position: absolute;">
           <rect width="400" height="300" fill="#f8c340"/>
        </svg>

        <!-- Bouquet (Hidden inside envelope) -->
        <div id="bouquet" class="absolute w-full flex justify-center bottom-[50px] z-10 scale-0 origin-bottom" style="height: 280px; overflow: visible;">
           <!-- SVGs will be injected via JS -->
        </div>

        <!-- Envelope Front Layer -->
        <svg viewBox="0 0 400 300" class="w-full h-auto z-20 pointer-events-none" style="position: relative;">
          <!-- Bottom FLap -->
          <path d="M0 300 L200 150 L400 300 Z" fill="#FFD166" stroke="#073B4C" stroke-width="4"/>
          <!-- Left/Right Flaps -->
          <path d="M0 0 L200 150 L0 300 Z" fill="#f5c24e" stroke="#073B4C" stroke-width="4"/>
          <path d="M400 0 L200 150 L400 300 Z" fill="#f5c24e" stroke="#073B4C" stroke-width="4"/>
        </svg>

        <!-- Envelope Top Flap (animates) -->
        <svg id="envelope-flap" viewBox="0 0 400 150" class="w-full h-auto absolute top-[-2px] left-0 z-30 pointer-events-none" style="transform-origin: top;">
          <path d="M0 0 L200 150 L400 0 Z" fill="#f8c340" stroke="#073B4C" stroke-width="4"/>
        </svg>

        <div id="tap-instruction" class="absolute bottom-[-60px] left-1/2 transform -translate-x-1/2 handwriting text-3xl z-40 bg-white px-4 py-2 brutal-border brutal-shadow rounded-md whitespace-nowrap">
          Tap the envelope! 💌
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
