<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You Too</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper" class="bg-[var(--dark)] text-[var(--light)]">
  
  <div id="audio-control" class="brutal-border brutal-shadow bg-white text-black">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble text-black" id="cat-speech">Shhh...</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="secret2">
    <div class="page-container flex-center flex-col relative w-full min-h-screen bg-[var(--dark)]">
      
      <div class="absolute top-8 left-8">
        <button id="go-back-btn" class="brutal-btn secondary text-black border-white shadow-[4px_4px_0_white]" onclick="window.history.back()">⬅️ Go Back</button>
      </div>

      <div class="max-w-xl w-full flex flex-col items-center z-10">
        
        <div class="p-4 bg-white brutal-border brutal-shadow-lg rotate-[-2deg] hover:rotate-1 transition-transform mb-12">
            <img src="picssss/shhhhhh.jpeg" alt="Shhh" class="w-full max-w-sm border-2 border-black">
        </div>
        
        <h1 class="text-4xl md:text-6xl text-[var(--pink)] font-bold mb-6 text-center" style="text-shadow: 4px 4px 0px black;">
          I love you too.
        </h1>
        
        <p class="text-xl md:text-2xl text-[var(--light)] text-center max-w-lg leading-relaxed font-sans mt-4 bg-black/30 p-6 rounded-xl border-2 border-white/20">
          More than all the stars, more than all the sunflowers. You mean everything to me. Happy birthday, my absolute favorite person in the entire universe. ✨💖
        </p>

      </div>
      
      <!-- Stars and hearts floating in background -->
      <div id="night-particles" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
