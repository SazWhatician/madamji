<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WARNING 🚨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Oh no!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="warning">
    <div class="page-container flex-center flex-col relative w-full min-h-screen py-4 bg-black text-white selection:bg-red-500">
      
      <div id="warning-content" class="w-11/12 max-w-xl flex flex-col items-center">
        <!-- Danger Stripes Header -->
        <div class="w-full h-4 mb-4 danger-stripes"></div>

        <h1 class="text-4xl md:text-6xl text-red-600 font-extrabold mb-2" style="text-shadow: 0 0 20px red;">WARNING!</h1>
        
        <div class="brutal-border brutal-shadow-lg p-1 bg-red-900 border-red-500 w-10/12 max-w-[400px] mb-4 relative">
          <video id="warning-video" class="w-full h-auto" autoplay loop muted playsinline>
             <source src="video/warning.mp4" type="video/mp4">
          </video>
        </div>

        <p class="text-xl md:text-2xl font-bold text-center text-yellow-400 max-w-lg leading-tight typing-effect">
          CRINGE ALERT 🚨<br>
          DO NOT SHOW THIS <br>TO YOUR FRIENDS!
        </p>

        <!-- Danger Stripes Footer -->
        <div class="w-full h-4 mt-4 danger-stripes"></div>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
