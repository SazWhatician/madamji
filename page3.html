<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>This is your vibe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Vibes!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="vibe">
    <div class="page-container flex-center flex-col relative w-full h-screen overflow-hidden bg-[var(--mint)]">
      
      <h1 class="text-5xl md:text-8xl text-white brutal-shadow font-extrabold mb-8 z-10 text-center" style="-webkit-text-stroke: 3px #073B4C; transform: rotate(-2deg);">THIS IS YOUR VIBE</h1>
      
      <div class="brutal-border brutal-shadow-lg p-2 bg-white rotate-2 hover:rotate-0 transition-transform z-10 w-11/12 max-w-xl relative">
        <video id="vibe-video" class="w-full h-auto object-cover border-4 border-black" playsinline>
           <source src="video/she.mp4" type="video/mp4">
        </video>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
