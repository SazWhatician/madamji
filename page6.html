<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youuuu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Wow!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="youPage">
    <div class="page-container flex-center flex-col relative w-full min-h-screen bg-[var(--dark)]">
      
      <div class="polaroid-container opacity-0 scale-50 z-10 mx-auto w-10/12 max-w-md mb-8">
        <div class="polaroid brutal-shadow-lg" style="transform-style: preserve-3d; transition: transform 0.2s;">
           <img src="picssss/youuuu.jpeg" alt="Youuuu" class="w-full object-cover">
        </div>
      </div>

      <div class="text-center opacity-0 translate-y-10" id="you-message">
         <h1 class="text-4xl md:text-6xl text-[var(--pink)] font-bold mb-6" style="text-shadow: 4px 4px 0px black;">
           Just look at you!
         </h1>
         <p class="text-xl md:text-2xl text-[var(--light)] max-w-lg leading-relaxed font-sans mt-4 bg-black/30 p-6 rounded-xl border-2 border-white/20 mx-auto mb-8">
           You are absolutely stunning, inside and out. Thank you for being you, Ankita.
         </p>
         
         <a href="game.html" class="brutal-btn primary transform hover:scale-110">Play a Game ➡️</a>
      </div>

      <!-- Stars and hearts floating in background -->
      <div id="night-particles" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
