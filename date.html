<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunch Date?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Lunch time!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="lunchDate">
    <div class="page-container flex flex-col items-center justify-center relative w-full h-screen overflow-hidden bg-[var(--sunflower)] text-[var(--dark)] px-4">
      
      <h1 class="text-4xl md:text-6xl font-bold mb-6 text-center brutal-shadow" style="-webkit-text-stroke: 2px white;">Will you go on a lunch date with me? 🥺</h1>
      
      <div class="brutal-border brutal-shadow-lg p-2 bg-white w-9/12 max-w-sm mb-6 relative aspect-[4/5]" id="date-media-container">
         <video id="date-video" class="w-full h-full object-cover border-4 border-black" autoplay loop muted playsinline>
             <source src="responsevids/plssss.mp4" type="video/mp4">
         </video>
         <img id="date-image" src="responsevids/ayyy.jpeg" class="w-full h-full object-cover border-4 border-black hidden">
      </div>
      
      <p id="date-text" class="text-3xl font-bold mb-4 text-[var(--pink)] hidden bg-white border-2 border-black px-4 py-2 brutal-shadow" style="transform: rotate(-2deg);">oyee mat kar bhondu</p>

      <div class="flex gap-4 md:gap-8 items-center justify-center w-full min-h-[80px]" id="btn-container">
         <button id="yes-btn" class="brutal-btn primary text-xl md:text-2xl px-6 py-3 z-10 cursor-pointer">YES! 💖</button>
         <button id="no-btn" class="brutal-btn secondary text-xl md:text-2xl px-6 py-3 z-20 cursor-pointer">NO! 😤</button>
      </div>
      
      <a href="warning.html" id="to-warning-btn" class="brutal-btn primary mt-8 hidden z-[100] transform hover:scale-110">Finish ➡️</a>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
