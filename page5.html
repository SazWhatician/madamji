<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">A folder!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="folderGallery">
    <div class="page-container flex-center flex-col relative w-full h-screen overflow-hidden bg-[var(--orange)]">
      
      <div class="fixed top-2 right-2 md:top-8 md:right-8 z-[100] scale-75 md:scale-100 origin-top-right">
        <a href="page6.html" id="next-btn-5" class="brutal-btn primary hide-initially opacity-0 pointer-events-none transition-opacity">Next ➡️</a>
      </div>

      <!-- Video Container -->
      <div id="madamji-vid-container" class="brutal-border brutal-shadow-lg p-3 bg-white w-8/12 max-w-xs md:max-w-sm rotate-[-2deg] transition-all duration-700 z-10 hover:rotate-1">
        <video id="madamji-video" class="w-full h-auto border-4 border-black object-cover aspect-[9/16]" controls muted>
          <source src="video/madamjiii.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Windows Folder (Initially Hidden) -->
      <div id="win-folder-widget" class="win-folder brutal-shadow-lg scale-0 opacity-0 absolute z-20 mt-10">
        <div class="win-header">
           <span>C:\Memories\For_Ankita</span>
           <span>_ ☐ X</span>
        </div>
        <div class="win-content">
           <div class="folder-icon select-none transition-transform active:scale-95"></div>
           <p class="font-sans text-black mt-2 text-sm font-bold truncate">Secret_Pics.zip</p>
           <p class="font-sans text-xs mt-1 text-gray-700">(Click to extract)</p>
        </div>
      </div>

      <!-- 3D Scatter Container -->
      <div id="scatter-gallery">
        <!-- Elements injected via JS -->
      </div>
      
      <!-- Scroll Indicator -->
      <div id="scroll-hint" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-white brutal-border brutal-shadow px-4 py-2 opacity-0 z-[60] handwriting pointer-events-none hidden">
         Scroll to browse! 👇
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
