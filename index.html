<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankita's Birthday!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <!-- Global Audio Player -->
  <audio id="bg-music" loop src="audio/sunflower.mpeg"></audio>
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>

  <!-- Global Cat Guide -->
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Hi! Let's go!</div>
    <div id="cat-svg-container"></div>
  </div>

  <!-- Global Heart Transition Overlay -->
  <div class="transition-screen">
    <!-- Inline SVG for the heart mask -->
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <!-- Global Sunflower Particle Container -->
  <div id="particles" class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1]"></div>

  <main data-barba="container" data-barba-namespace="home">
    <div class="page-container flex-center flex-col relative w-full min-h-screen">
      
      <!-- Splash Content -->
      <h2 id="its-time" class="text-4xl md:text-6xl text-white brutal-shadow absolute font-bold tracking-wider" style="-webkit-text-stroke: 2px #073B4C;">it's time...</h2>
      
      <div id="bday-text" class="hidden flex-col items-center z-10 w-full text-center">
        <h1 class="text-5xl md:text-8xl text-[#EF476F] mb-4 brutal-shadow font-extrabold" style="-webkit-text-stroke: 3px #073B4C; transform: rotate(-2deg);">HAPPY</h1>
        <h1 class="text-5xl md:text-8xl text-[#FFD166] mb-8 brutal-shadow font-extrabold" style="-webkit-text-stroke: 3px #073B4C; transform: rotate(2deg);">BIRTHDAY</h1>
        <h1 class="text-6xl md:text-9xl text-[#06D6A0] mb-12 brutal-shadow font-extrabold" style="-webkit-text-stroke: 3px #073B4C;">ANKITA!</h1>
        
        <a href="page2.html" class="brutal-btn primary mt-8 transform hover:scale-110">Next Page ➡️</a>
      </div>

      <!-- Decor container (dogs/cats) -->
      <div id="decor-container" class="absolute w-full h-full pointer-events-none"></div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
