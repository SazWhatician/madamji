<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Perfection!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="luvpic">
    <div class="page-container flex-center flex-col relative w-full h-screen overflow-hidden bg-[var(--pink)]">
      
      <!-- Falling hearts in background -->
      <div id="hearts-bg" class="absolute w-full h-full object-cover z-0 overflow-hidden pointer-events-none"></div>

      <div class="polaroid-container scale-0 rotate-[10deg] opacity-0 z-10 mx-auto w-10/12 max-w-md">
        <div class="polaroid brutal-shadow-lg" style="transform-style: preserve-3d; transition: transform 0.2s;">
           <img src="picssss/luvuuuu.jpeg" alt="Luv u" class="w-full object-cover">
           <p class="handwriting mt-4 text-[var(--dark)] text-2xl text-center font-bold">SO MUCH LOVE! 💖</p>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
