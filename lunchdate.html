<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunch Date? 🍕</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-barba="wrapper">
  
  <div id="audio-control" class="brutal-border brutal-shadow">🎵</div>
  
  <div id="cat-guide-container">
    <div class="speech-bubble" id="cat-speech">Say yes!</div>
    <div id="cat-svg-container"></div>
  </div>

  <div class="transition-screen">
    <svg id="heart-mask" viewBox="0 0 100 100" style="width: 0; height: 0; transform-origin: center;">
      <path d="M50 85 C 0 50, 0 20, 25 10 C 38 5, 50 15, 50 20 C 50 15, 62 5, 75 10 C 100 20, 100 50, 50 85 Z" fill="#EF476F" />
    </svg>
  </div>

  <main data-barba="container" data-barba-namespace="lunchDate">
    <div class="page-container flex-center flex-col relative w-full min-h-screen" style="background: linear-gradient(135deg, #073B4C 0%, #0a2540 50%, #1a1a2e 100%);">
      
      <!-- Floating hearts background -->
      <div id="lunch-hearts-bg" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></div>

      <!-- Main Content -->
      <div id="lunch-content" class="relative z-10 flex flex-col items-center w-11/12 max-w-lg">
        
        <!-- Title -->
        <h1 id="lunch-title" class="text-3xl md:text-5xl text-[var(--sunflower)] font-bold mb-4 text-center" style="text-shadow: 4px 4px 0px rgba(0,0,0,0.5); -webkit-text-stroke: 2px #073B4C;">
          Lunch Date? 🍕
        </h1>

        <!-- Media Container -->
        <div id="lunch-media-wrap" class="brutal-border brutal-shadow-lg bg-white p-2 mb-4 w-full max-w-[300px] mx-auto" style="border-radius: 18px;">
          <!-- Initial Video -->
          <video id="lunch-video-plssss" class="w-full rounded-lg" autoplay loop muted playsinline style="border: 4px solid var(--dark); border-radius: 12px;">
            <source src="responsevids/plssss.mp4" type="video/mp4">
          </video>
          <!-- Rejection Image (hidden initially) -->
          <img id="lunch-img-ayyy" src="responsevids/ayyy.jpeg" alt="oyee" class="w-full rounded-lg hidden" style="border: 4px solid var(--dark); border-radius: 12px;">
          <!-- Joy Video (hidden initially) -->
          <video id="lunch-video-joyy" class="w-full rounded-lg hidden" muted playsinline style="border: 4px solid var(--dark); border-radius: 12px;">
            <source src="responsevids/joyy.mp4" type="video/mp4">
          </video>
        </div>

        <!-- Rejection text (hidden initially) -->
        <p id="lunch-reject-text" class="handwriting text-2xl md:text-3xl text-[var(--pink)] text-center mb-4 hidden" style="text-shadow: 2px 2px 0px rgba(0,0,0,0.3);">
          oyee mat kar bhondu 😤
        </p>

        <!-- Buttons -->
        <div id="lunch-buttons" class="flex gap-6 mt-4 items-center justify-center relative">
          <button id="lunch-yes-btn" class="brutal-btn primary text-2xl px-10 py-4 transform hover:scale-110 z-20">
            Yes! 💕
          </button>
          <button id="lunch-no-btn" class="brutal-btn text-2xl px-10 py-4 z-20" style="background-color: #ff4444; color: white;">
            No 😢
          </button>
        </div>
      </div>

      <!-- Confetti container -->
      <div id="lunch-confetti" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="app.js"></script>
</body>
</html>
